<%#
    ARX3000M — 500 错误页（毛玻璃 + 返回首页）
-%>
<!DOCTYPE html>
<html lang="<%= luci.i18n.languageCode() %>" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 · <%= pcdata(luci.sys.hostname()) %></title>
    <script>
    (function(){try{var T=['dark','light','sky','aurora'],L='arx-theme',LK='arx-theme-user-set';if(localStorage.getItem(LK)==='1'){var v=localStorage.getItem(L);if(v&&T.indexOf(v)>=0){document.documentElement.setAttribute('data-theme',v);return;}}var v2=localStorage.getItem(L);if(v2==='sky'||v2==='aurora'){if(T.indexOf(v2)>=0){document.documentElement.setAttribute('data-theme',v2);return;}}document.documentElement.setAttribute('data-theme','light');}catch(e){}})();
    </script>
    <link rel="stylesheet" href="<%=media%>/css/style.css?v=3.2">
    <style>
        .arx-error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; background: var(--page-background); }
        .arx-error-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(ellipse at 22% 58%, rgba(239,68,68,0.12) 0%, transparent 50%), radial-gradient(ellipse at 78% 42%, rgba(45, 212, 191, 0.08) 0%, transparent 55%); }
        .arx-error-card { position: relative; z-index: 1; max-width: 420px; width: 100%; padding: 40px 36px; border-radius: 20px; text-align: center;
            background: rgba(17, 24, 39, 0.65); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 32px 64px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06); }
        :is([data-theme="light"], [data-theme="sky"]) .arx-error-card { background: rgba(255,255,255,0.78); border-color: rgba(0,0,0,0.08); }
        [data-theme="aurora"] .arx-error-card { background: rgba(22, 24, 53, 0.75); border-color: rgba(199, 210, 254, 0.12); }
        .arx-error-card h1 { font-family: var(--font-display, 'Sora', system-ui, sans-serif); font-size: 2.5rem; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.04em; color: var(--danger); }
        .arx-error-card p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin: 0 0 20px; }
        .arx-error-msg { font-size: 12px; color: var(--text-secondary); word-break: break-all; margin-bottom: 24px; padding: 10px 12px; border-radius: 10px; background: var(--bg-hover); border: 1px solid var(--border-color); text-align: left; max-height: 120px; overflow: auto; }
        .arx-error-home { display: inline-flex; align-items: center; justify-content: center; min-width: 200px; padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none; color: #fff !important;
            background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 4px 20px rgba(var(--primary-rgb), 0.35); transition: transform 0.2s, box-shadow 0.2s; }
        .arx-error-home:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(var(--primary-rgb), 0.45); }
        .arx-error-illus { margin: 0 auto 20px; width: 160px; height: 120px; }
    </style>
</head>
<body class="arx-error-page">
    <div class="arx-error-bg" aria-hidden="true"></div>
    <div class="arx-error-card">
        <div class="arx-error-illus" aria-hidden="true">
            <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg" width="160" height="120">
                <defs>
                    <linearGradient id="g500a" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#64748b"/><stop offset="100%" style="stop-color:#94a3b8"/></linearGradient>
                </defs>
                <ellipse cx="100" cy="118" rx="62" ry="14" fill="rgba(0,0,0,0.12)"/>
                <rect x="45" y="40" width="110" height="75" rx="14" fill="url(#g500a)" opacity="0.95"/>
                <rect x="58" y="55" width="84" height="8" rx="3" fill="rgba(255,255,255,0.35)"/>
                <rect x="58" y="72" width="64" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
                <rect x="58" y="84" width="72" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
                <circle cx="100" cy="28" r="22" fill="#fecdd3" stroke="#f87171" stroke-width="2"/>
                <path d="M92 26 Q100 34 108 26" stroke="#b91c1c" stroke-width="2" fill="none" stroke-linecap="round"/>
                <circle cx="94" cy="24" r="2" fill="#1e293b"/>
                <circle cx="106" cy="24" r="2" fill="#1e293b"/>
                <path d="M165 55 L175 65 M175 55 L165 65" stroke="var(--danger)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
            </svg>
        </div>
        <h1>500</h1>
        <p>服务器处理请求时遇到问题。请稍后再试，或返回首页继续操作。</p>
        <% if message and message ~= "" then %>
        <div class="arx-error-msg"><%= pcdata(message) %></div>
        <% end %>
        <a class="arx-error-home" href="<%= luci.dispatcher.build_url("admin", "arx-dashboard", "overview") %>">返回首页</a>
    </div>
</body>
</html>

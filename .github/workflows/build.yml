name: Build ARX3000M OpenWrt Firmware

on:
  push:
    branches: [main, master]
    paths-ignore: ['**.md', '**.txt', 'docs/**', '.gitignore']
  pull_request:
    branches: [main, master]
    paths-ignore: ['**.md', '**.txt', 'docs/**', '.gitignore']
  workflow_dispatch:
    inputs:
      target:
        description: '编译目标'
        required: false
        default: 'mediatek/filogic'
      upload_release:
        description: '上传到 Release (仅 main 分支)'
        type: boolean
        required: false
        default: true

# 同一分支上新运行会取消正在跑的，只保留最新一次（省配额）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/rax3000m.config
  BUILD_DIR: openwrt
  UPLOAD_BIN: true
  UPLOAD_FIRMWARE: true
  CACHE_DIR: ${{ github.workspace }}/cache
  # Node 20 JS actions (e.g. softprops/action-gh-release) — opt into Node 24 on runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 🔨 编译固件
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache-dir
      CCACHE_TEMPDIR: /tmp/.ccache-temp
      CCACHE_COMPRESS: true
      CCACHE_MAXSIZE: 2G

    steps:
      - name: 检出代码
        uses: actions/checkout@v6.0.2

      # 缓存必须在写入 dl-cache / ccache-dir 的同一 job 内 save；单独 prepare job 从不填充路径，post 会报 Path Validation Error
      - name: 获取缓存 Key
        id: cache_keys
        run: |
          echo "key=arx3000m-${{ env.OPENWRT_BRANCH }}-${{ hashFiles('config/*.config', 'packages/*/Makefile', 'theme/Makefile', 'patches/openwrt/*.patch', 'scripts/apply-openwrt-patches.sh', 'scripts/ensure-extra-feeds.sh', 'scripts/patch-packages-feed.sh') }}" >> $GITHUB_OUTPUT

      - name: 恢复 dl 缓存
        uses: actions/cache@v5.0.4
        with:
          path: ${{ github.workspace }}/dl-cache
          key: dl-${{ steps.cache_keys.outputs.key }}
          restore-keys: |
            dl-arx3000m-${{ env.OPENWRT_BRANCH }}-

      - name: 恢复 ccache 缓存
        uses: actions/cache@v5.0.4
        with:
          path: ${{ github.workspace }}/ccache-dir
          key: ccache-${{ steps.cache_keys.outputs.key }}
          restore-keys: |
            ccache-arx3000m-${{ env.OPENWRT_BRANCH }}-

      # cache post 会校验 path 存在；仅 restore miss 时 dl-cache 可能尚未创建，提前占位避免 “Path Validation Error”
      - name: 确保缓存目录存在
        run: |
          mkdir -p "${{ github.workspace }}/dl-cache" "${{ github.workspace }}/ccache-dir"

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache ecj fastjar file g++ gcc \
            default-jdk git libncurses5-dev libssl-dev \
            python3-distutils python3-pyelftools python3-setuptools \
            rsync subversion swig unzip wget zlib1g-dev \
            curl python3-pip python3-full flex bison gettext \
            libelf-dev autoconf automake libtool binutils \
            patch bash-completion coreutils quilt \
            re2c xsltproc zstd libzstd-dev \
            python3-yaml python3-werkzeug python3-requests \
            upx-ucl \
            libxml2-utils xmlstarlet \
            bc jq rename

      - name: 初始化 ccache
        run: |
          ccache --set-config=max_size=${{ env.CCACHE_MAXSIZE }}
          ccache --set-config=compression=true
          ccache -z
          ccache -s || true

      - name: 克隆 OpenWrt 源码
        run: |
          if [ -d "${{ env.BUILD_DIR }}" ]; then
            cd ${{ env.BUILD_DIR }}
            git pull origin ${{ env.OPENWRT_BRANCH }} 2>/dev/null || true
          else
            git clone --depth 1 --branch ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} ${{ env.BUILD_DIR }}
          fi
          echo "OpenWrt 版本: $(cd ${{ env.BUILD_DIR }} && git describe --tags 2>/dev/null || echo 'latest')"
          echo "提交信息: $(cd ${{ env.BUILD_DIR }} && git log -1 --pretty=format:'%h %s')"

      - name: 应用 OpenWrt 补丁
        run: |
          bash "$GITHUB_WORKSPACE/scripts/apply-openwrt-patches.sh" "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/${{ env.BUILD_DIR }}"

      - name: 复制自定义包到 OpenWrt
        run: |
          cd ${{ env.BUILD_DIR }}
          mkdir -p package/custom

          # 复制自定义主题
          if [ -d "$GITHUB_WORKSPACE/theme" ]; then
            cp -r "$GITHUB_WORKSPACE/theme" package/custom/luci-theme-arx3000m
            echo "✅ 自定义主题已复制"
          fi

          # 复制所有自定义应用模块
          if [ -d "$GITHUB_WORKSPACE/packages" ]; then
            for pkg in "$GITHUB_WORKSPACE/packages/"*/; do
              if [ -d "$pkg" ]; then
                pkg_name=$(basename "$pkg")
                rm -rf "package/custom/$pkg_name"
                cp -r "$pkg" "package/custom/"
                echo "✅ 包 $pkg_name 已复制"
              fi
            done
          fi

          ls -la package/custom/

      - name: 更新并安装 Feeds
        run: |
          cd ${{ env.BUILD_DIR }}
          bash "$GITHUB_WORKSPACE/scripts/ensure-extra-feeds.sh" "$(pwd)"
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f -p packages
          ./scripts/feeds install -a -f -p luci
          ./scripts/feeds install -a -f -p routing
          ./scripts/feeds install -a -f -p telephony || true
          ./scripts/feeds install -a -f -p video || true
          ./scripts/feeds install -a -f -p openclash
          bash "$GITHUB_WORKSPACE/scripts/patch-packages-feed.sh" "$(pwd)"

      - name: 加载预配置
        run: |
          cd ${{ env.BUILD_DIR }}
          if [ -f "$GITHUB_WORKSPACE/${{ env.CONFIG_FILE }}" ]; then
            cp "$GITHUB_WORKSPACE/${{ env.CONFIG_FILE }}" .config
            echo "✅ 预配置已加载"
          else
            echo "⚠️ 未找到配置文件，使用默认配置"
          fi
          make defconfig

      - name: 下载源码包
        run: |
          cd ${{ env.BUILD_DIR }}

          # 如果有缓存的 dl 目录，先复制过来
          if [ -d "$GITHUB_WORKSPACE/dl-cache" ] && [ "$(ls -A $GITHUB_WORKSPACE/dl-cache 2>/dev/null)" ]; then
            cp -n $GITHUB_WORKSPACE/dl-cache/* dl/ 2>/dev/null || true
            echo "📦 从缓存恢复 $(ls $GITHUB_WORKSPACE/dl-cache | wc -l) 个源码包"
          fi

          # 下载缺失的源码包
          make download -j$(nproc) || {
            echo "⚠️ 部分源码包下载失败，重试中..."
            sleep 10
            make download -j$(nproc)
          }

          # 缓存下载的文件（目录须存在，否则 cp 静默失败且 cache post 无内容可存）
          mkdir -p "$GITHUB_WORKSPACE/dl-cache"
          cp -n dl/* "$GITHUB_WORKSPACE/dl-cache/" 2>/dev/null || true

      - name: 编译固件
        run: |
          cd ${{ env.BUILD_DIR }}
          echo "============================================"
          echo "  开始编译 ARX3000M 固件"
          echo "  CPU 核心数: $(nproc)"
          echo "  时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          # [M10] set -o pipefail 确保 make 失败时步骤失败，防止上传破损固件
          set -o pipefail
          make -j$(nproc) V=s 2>&1 | tee build.log
          echo "============================================"
          echo "  编译完成!"
          echo "============================================"

      - name: ccache 统计
        run: ccache -s || true

      - name: 整理编译产物
        run: |
          cd ${{ env.BUILD_DIR }}
          mkdir -p "${{ github.workspace }}/firmware-all-tmp"
          TARGET_DIR="bin/targets"
          FW_ROOT="${{ github.workspace }}/firmware"

          if [ ! -d "$TARGET_DIR" ]; then
            echo "❌ 未找到目标目录，编译可能失败"
            tail -100 build.log || true
            exit 1
          fi

          # 固件：Filogic RAX3000M 上游为 squashfs-sysupgrade.itb / initramfs-recovery.itb 及 bootloader artifact（.bin/.fip）
          # 使用进程替换而非 pipe|while，避免子 shell 内 exit 无法使整个 step 失败
          set -euo pipefail
          FW_TMP="${{ github.workspace }}/firmware-all-tmp"
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            cp "$f" "$FW_TMP/" || { echo "❌ 复制失败: $f" >&2; exit 1; }
          done < <(find "$TARGET_DIR" -type f \( \
            -name "*.bin" -o -name "*.img" -o -name "*.itb" -o \
            -name "*.fip" -o -name "*.sysupgrade*" -o -name "*.factory*" \
          \))

          # 单一 sha256sums，避免多子目标互相覆盖
          if [ -f "$TARGET_DIR/mediatek/filogic/sha256sums" ]; then
            cp "$TARGET_DIR/mediatek/filogic/sha256sums" "$FW_TMP/"
          else
            s=$(find "$TARGET_DIR" -name sha256sums -type f -print -quit)
            [ -n "$s" ] && cp "$s" "$FW_TMP/"
          fi

          # manifest：优先 filogic 目录
          if [ -d "$TARGET_DIR/mediatek/filogic" ]; then
            shopt -s nullglob
            for m in "$TARGET_DIR/mediatek/filogic"/*.manifest; do
              [ -f "$m" ] && cp "$m" "$FW_TMP/"
            done
            shopt -u nullglob
          else
            find "$TARGET_DIR" -name "*.manifest" -type f -exec cp {} "$FW_TMP/" \;
          fi

          bash "$GITHUB_WORKSPACE/scripts/split-firmware-artifacts.sh" \
            "$FW_TMP" \
            "$FW_ROOT"

          if [ -z "$(find "$FW_ROOT/sysupgrade" -maxdepth 1 -name '*.itb' -type f -print -quit 2>/dev/null)" ]; then
            echo "❌ sysupgrade 目录下缺少 .itb 固件，中止"
            find "$FW_ROOT" -type f | head -50 || true
            exit 1
          fi

          any=0
          for d in sysupgrade nand-boot emmc-boot misc; do
            if [ -d "$FW_ROOT/$d" ] && [ "$(ls -A "$FW_ROOT/$d" 2>/dev/null)" ]; then
              any=1
              break
            fi
          done
          if [ "$any" -eq 0 ]; then
            echo "❌ 分目录后无有效子目录"
            exit 1
          fi

          echo "📦 固件产物（已分目录：sysupgrade / nand-boot / emmc-boot / misc）:"
          find "$FW_ROOT" -type f | head -80 || true

      - name: 上传固件产物
        uses: actions/upload-artifact@v6.0.0
        with:
          name: arx3000m-firmware-${{ github.run_number }}
          path: firmware/
          retention-days: 14
          if-no-files-found: error

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: build-log-${{ github.run_number }}
          path: |
            ${{ env.BUILD_DIR }}/build.log
            ${{ env.BUILD_DIR }}/logs/
          retention-days: 7
          if-no-files-found: ignore

  release:
    name: 🚀 发布 Release
    runs-on: ubuntu-22.04
    needs: build
    # main/master 的 push 会跑；PR 不发布；手动 workflow_dispatch 时由 upload_release 决定是否发布
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.upload_release == true || inputs.upload_release == 'true'))
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v6.0.2

      - name: 下载固件产物
        uses: actions/download-artifact@v8.0.1
        with:
          name: arx3000m-firmware-${{ github.run_number }}
          path: firmware/

      - name: 准备 Release 附件（仅含非空子目录）
        run: |
          mkdir -p release-assets
          any=0
          for d in sysupgrade nand-boot emmc-boot misc; do
            if [ -d "firmware/$d" ] && [ "$(ls -A firmware/$d 2>/dev/null)" ]; then
              cp -a "firmware/$d" "release-assets/"
              any=1
            fi
          done
          if [ "$any" -eq 0 ]; then
            echo "❌ firmware 下无 sysupgrade / nand-boot / emmc-boot / misc 有效文件"
            ls -laR firmware/ || true
            exit 1
          fi
          ls -R release-assets/

      - name: 生成版本标签
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          DATE=$(date '+%Y%m%d')
          # run_attempt：重新运行同一 workflow run 时递增，避免 tag 已存在导致 Release 失败
          TAG="${VERSION}-${DATE}-a${{ github.run_attempt }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ARX3000M Firmware ${{ steps.version.outputs.tag }}"
          body: |
            ## ARX3000M (RAX3000M) OpenWrt 固件
            
            **版本**: ${{ steps.version.outputs.tag }}
            **Commit**: `${{ github.sha }}`
            **触发**: ${{ github.actor }} via ${{ github.event_name }}
            **说明**: 标签后缀 `-aN` 为 GitHub Actions 的 `run_attempt`，同一 run 重试时会递增以免与已有 tag 冲突。
            
            ---
            
            ### 固件说明（OpenWrt `main` / `cmcc_rax3000m`）
            
            产物分目录（避免 NAND / eMMC 裸刷件与日常升级包混放）：
            
            | 目录 | 内容 |
            |------|------|
            | **`sysupgrade/`** | `*squashfs*sysupgrade*.itb`（日常升级）、`*initramfs*recovery*.itb`（救砖/TFTP）、`*.manifest`、FIT 别名 `.bin` 等 |
            | **`nand-boot/`** | `*nand-ddr3-*` / `*nand-ddr4-*` 的 preloader / fip：**仅 NAND 机裸写**，DDR 型号须与硬件一致 |
            | **`emmc-boot/`** | `*emmc-*`：**仅 eMMC 算力版裸写**；NAND 机勿用 |
            | **`misc/`** | 未归入上列的上游文件；**勿当作日常 sysupgrade**，仅供排查或特殊用途 |
            
            ### 刷入方法（已运行 OpenWrt 时）
            
            1. 进入 LuCI → 系统 → 备份/升级
            2. 选择 **`*squashfs*sysupgrade*.itb`**（扩展名为 **`.itb`**）
            3. 按需勾选「保留配置」
            4. 上传并等待重启；刷前请核对 `sha256sums`
            
            ### 功能模块
            
            - ✅ ARX3000M 现代化主题 (深色/浅色)
            - ✅ 系统监控仪表盘 (CPU/内存/温度/网络)
            - ✅ 设备管理器 (屏蔽/解封/IP绑定)
            - ✅ 高级网络工具 (端口转发/防火墙/诊断)
            
            > ⚠️ 请确认你的设备型号为 RAX3000M (MT7981B)，刷错型号可能导致变砖！
          files: release-assets/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

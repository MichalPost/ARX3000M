name: Release ARX3000M Firmware

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build workflow 的 Run ID（留空则使用最新一次成功的）'
        required: false
        default: ''
      tag_suffix:
        description: '版本后缀（可选，如 hotfix）'
        required: false
        default: ''

env:
  # Node 20 JS actions (e.g. softprops/action-gh-release) — opt into Node 24 on runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: 🚀 发布 Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v6.0.2

      - name: 确定 Run ID
        id: resolve_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            echo "未指定 Run ID，查找最新一次成功的 build run..."
            RUN_ID=$(gh run list \
              --workflow build.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "❌ 找不到任何成功的 build run"
              exit 1
            fi
            echo "✅ 使用最新成功 Run ID: $RUN_ID"
          else
            echo "✅ 使用指定 Run ID: $RUN_ID"
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: 下载固件 Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p firmware firmware-raw
          gh run download ${{ steps.resolve_run.outputs.run_id }} \
            --pattern "arx3000m-firmware-*" \
            --dir firmware-raw
          # 保留 sysupgrade / nand-boot / emmc-boot / misc 分目录（与 build 工作流一致；兼容 artifact 多包一层目录）
          mkdir -p firmware
          shopt -s nullglob
          copied=0
          for s in firmware-raw/sysupgrade firmware-raw/*/sysupgrade; do
            if [ -d "$s" ]; then
              parent=$(dirname "$s")
              for d in sysupgrade nand-boot emmc-boot misc; do
                if [ -d "$parent/$d" ]; then
                  cp -a "$parent/$d" firmware/
                  copied=1
                fi
              done
              break
            fi
          done
          shopt -u nullglob
          if [ "$copied" -eq 0 ]; then
            parent=$(find firmware-raw -type d -name sysupgrade -printf '%h\n' -quit)
            if [ -n "$parent" ]; then
              for d in sysupgrade nand-boot emmc-boot misc; do
                [ -d "$parent/$d" ] && cp -a "$parent/$d" firmware/ && copied=1
              done
            fi
          fi
          count=$(find firmware -type f 2>/dev/null | wc -l)
          count=$(echo "$count" | tr -d ' ')
          if [ -z "$count" ] || [ "$count" -eq 0 ]; then
            echo "❌ 未找到任何固件文件，中止发布"
            find firmware-raw -type f | head -50 || true
            exit 1
          fi
          echo "📦 固件目录:"
          ls -R firmware/

      - name: 生成版本标签
        id: version
        run: |
          VERSION="v1.0.${{ steps.resolve_run.outputs.run_id }}"
          DATE=$(date '+%Y%m%d')
          SUFFIX="${{ inputs.tag_suffix }}"
          ATTEMPT="-a${{ github.run_attempt }}"
          if [ -n "$SUFFIX" ]; then
            TAG="${VERSION}-${DATE}-${SUFFIX}${ATTEMPT}"
          else
            TAG="${VERSION}-${DATE}${ATTEMPT}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 准备 Release 附件（仅含非空子目录）
        run: |
          mkdir -p release-assets
          any=0
          for d in sysupgrade nand-boot emmc-boot misc; do
            if [ -d "firmware/$d" ] && [ "$(ls -A firmware/$d 2>/dev/null)" ]; then
              cp -a "firmware/$d" "release-assets/"
              any=1
            fi
          done
          if [ "$any" -eq 0 ]; then
            echo "❌ 无有效固件子目录"
            exit 1
          fi
          ls -R release-assets/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ARX3000M Firmware ${{ steps.version.outputs.tag }}"
          body: |
            ## ARX3000M (RAX3000M) OpenWrt 固件

            **版本**: ${{ steps.version.outputs.tag }}
            **来源 Run**: [${{ steps.resolve_run.outputs.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ steps.resolve_run.outputs.run_id }})
            **发布者**: ${{ github.actor }}
            **说明**: 标签中的 `-aN` 为本次 Release 工作流的 `run_attempt`，重跑发布时可避免与已有 tag 冲突。

            ---

            ### 固件说明（OpenWrt `main` / `cmcc_rax3000m`）

            产物目录：**`sysupgrade/`**（日常/ recovery）、**`nand-boot/`**（NAND 裸刷）、**`emmc-boot/`**（eMMC 算力版裸刷）、**`misc/`**（未归类上游文件，勿当日常 sysupgrade）。NAND 机切勿使用 `emmc-boot/` 内文件。

            ### 刷入方法（已运行 OpenWrt 时）

            1. 进入 LuCI → 系统 → 备份/升级
            2. 选择 **`*squashfs*sysupgrade*.itb`**（扩展名为 **`.itb`**）
            3. 按需勾选「保留配置」
            4. 上传并等待重启；刷前请核对 `sha256sums`

            ### 功能模块

            - ✅ ARX3000M 现代化主题 (深色/浅色)
            - ✅ 系统监控仪表盘 (CPU/内存/温度/网络)
            - ✅ 设备管理器 (屏蔽/解封/IP绑定)
            - ✅ 高级网络工具 (端口转发/防火墙/诊断)
            - ✅ WiFi 握手抓包工具

            > ⚠️ 请确认你的设备型号为 RAX3000M (MT7981B)，刷错型号可能导致变砖！
          files: release-assets/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
